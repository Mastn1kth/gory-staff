name: staff

services:
  postgres:
    image: postgres:16-alpine
    container_name: gory-staff-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: gory_staff
      POSTGRES_USER: gory
      POSTGRES_PASSWORD: gory
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - gory_staff_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gory -d gory_staff"]
      interval: 5s
      timeout: 5s
      retries: 12

volumes:
  gory_staff_pgdata:
